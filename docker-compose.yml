services:
  postgres:
    image: postgres:16-alpine
    container_name: zavestudios-postgres
    environment:
      POSTGRES_DB: etl
      POSTGRES_USER: etl_user
      POSTGRES_PASSWORD: etl_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etl_user -d etl"]
      interval: 5s
      timeout: 5s
      retries: 20

  airflow:
    image: apache/airflow:2.9.3-python3.11
    container_name: zavestudios-airflow-local
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      ETL_EXECUTION_BACKEND: local
      ETL_INPUT_PATH: /opt/airflow/data/listings.csv
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: etl
      DB_USER: etl_user
      DB_PASSWORD: etl_pass
      DB_SSLMODE: disable
      ETL_LOG_LEVEL: INFO
      ETL_REJECTS_PATH: /tmp/rejects.ndjson
      PYTHONPATH: /opt/airflow
      _PIP_ADDITIONAL_REQUIREMENTS: "apache-airflow-providers-cncf-kubernetes==8.2.0 pydantic==2.8.2 pydantic-settings==2.3.4 sqlalchemy==2.0.32 psycopg[binary]==3.2.1"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./etl:/opt/airflow/etl
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
      - airflow_logs:/opt/airflow/logs
    command: standalone

  etl-extract-validate:
    build:
      context: .
    image: zavestudios/etl-runner:0.1.0
    container_name: zavestudios-etl-extract-validate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: etl
      DB_USER: etl_user
      DB_PASSWORD: etl_pass
      DB_SSLMODE: disable
      ETL_LOG_LEVEL: INFO
      ETL_REJECTS_PATH: /tmp/rejects.ndjson
    volumes:
      - ./data:/app/data:ro
      - ./etl:/app/etl
      - ./scripts:/app/scripts
    command:
      - -m
      - etl.jobs.ingest_csv
      - --input
      - /app/data/listings.csv
      - --run-date
      - "2026-02-11"
      - --batch-id
      - compose-local
      - --stage
      - extract_validate
    profiles:
      - validate

  etl-load-postgres:
    build:
      context: .
    image: zavestudios/etl-runner:0.1.0
    container_name: zavestudios-etl-load-postgres
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: etl
      DB_USER: etl_user
      DB_PASSWORD: etl_pass
      DB_SSLMODE: disable
      ETL_LOG_LEVEL: INFO
      ETL_REJECTS_PATH: /tmp/rejects.ndjson
      PYTHONPATH: /app
    volumes:
      - ./data:/app/data:ro
      - ./etl:/app/etl
      - ./scripts:/app/scripts
    command:
      - -m
      - etl.jobs.ingest_csv
      - --input
      - /app/data/listings.csv
      - --run-date
      - "2026-02-11"
      - --batch-id
      - compose-local
      - --stage
      - load_postgres

  etl-dq-assertions:
    build:
      context: .
    image: zavestudios/etl-runner:0.1.0
    container_name: zavestudios-etl-dq-assertions
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: etl
      DB_USER: etl_user
      DB_PASSWORD: etl_pass
      DB_SSLMODE: disable
      ETL_LOG_LEVEL: INFO
      ETL_REJECTS_PATH: /tmp/rejects.ndjson
    volumes:
      - ./data:/app/data:ro
      - ./etl:/app/etl
      - ./scripts:/app/scripts
    command:
      - -m
      - etl.jobs.ingest_csv
      - --input
      - /app/data/listings.csv
      - --run-date
      - "2026-02-11"
      - --batch-id
      - compose-local
      - --stage
      - dq_assertions
    profiles:
      - dq

volumes:
  postgres_data:
  airflow_logs:
